<!doctype html>
<html>
    <head>
        <title>Myco</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <style>
            :root {
                --bg: #14171c;
                --panel: #1b1f27;
                --panel2: #232833;
                --border: #2c323d;
                --fg: #d7dbe2;
                --muted: #8b93a1;
                --accent: #6ea8fe;
                --user: #7ee787;
                --tool: #d2a8ff;
                --err: #ff7b72;
                --think: #7d8590;
            }
            * { box-sizing: border-box; }
            html, body {
                margin: 0; height: 100%;
                background: var(--bg); color: var(--fg);
                font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }
            #app-root { display: flex; height: 100vh; }
            .sidebar {
                width: 280px; flex: none; border-right: 1px solid var(--border);
                background: var(--panel); display: flex; flex-direction: column;
            }
            .sidebar h1 { font-size: 15px; margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--border); }
            .sidebar h1 .dim { color: var(--muted); font-weight: normal; }
            .session-list { overflow-y: auto; flex: 1; }
            .session-item {
                padding: 10px 16px; border-bottom: 1px solid var(--border);
                cursor: pointer;
            }
            .session-item:hover { background: var(--panel2); }
            .session-item.active { background: var(--panel2); border-left: 3px solid var(--accent); }
            .session-item .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .session-item .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
            .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--accent); color: #06121f; margin-left: 6px; }
            .badge.live { background: var(--user); }
            .sidebar .actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
            button {
                background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
                border-radius: 6px; padding: 6px 10px; cursor: pointer; font: inherit;
            }
            button:hover:not(:disabled) { border-color: var(--accent); }
            button:disabled { opacity: .5; cursor: default; }
            select { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 5px; font: inherit; }
            .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
            .topbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
            .topbar .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .hosts { display: flex; gap: 8px; flex-wrap: wrap; }
            .host { font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); }
            .host.up { color: var(--user); border-color: #2ea04326; }
            .host.down { color: var(--err); border-color: #ff7b7226; }
            .transcript { flex: 1; overflow-y: auto; padding: 16px; }
            .msg { margin-bottom: 16px; }
            .role { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
            .msg.user .role { color: var(--user); }
            .msg.assistant .role { color: var(--accent); }
            .bubble { white-space: pre-wrap; word-break: break-word; }
            .thinking { color: var(--think); font-style: italic; border-left: 2px solid var(--border); padding-left: 10px; margin: 4px 0; }
            .tool {
                border: 1px solid var(--border); border-radius: 6px; margin: 6px 0;
                background: var(--panel);
            }
            .tool > summary { cursor: pointer; padding: 6px 10px; color: var(--tool); list-style: none; }
            .tool > summary::-webkit-details-marker { display: none; }
            .tool > summary .spin { color: var(--accent); }
            .tool > summary .ok { color: var(--user); }
            .tool > summary .fail { color: var(--err); }
            .tool .body { padding: 8px 10px; border-top: 1px solid var(--border); }
            .tool pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--muted); font-size: 12px; }
            .depth { margin-left: 16px; border-left: 2px solid var(--border); padding-left: 8px; }
            .composer { border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 8px; }
            .composer textarea {
                flex: 1; resize: none; height: 60px; background: var(--panel2); color: var(--fg);
                border: 1px solid var(--border); border-radius: 6px; padding: 8px; font: inherit;
            }
            .composer .col { display: flex; flex-direction: column; gap: 6px; }
            .empty { color: var(--muted); padding: 40px; text-align: center; }
            .err { color: var(--err); }
            .scratchpad { padding: 8px 16px; border-bottom: 1px solid var(--border); }
            .scratchpad textarea {
                width: 100%; height: 44px; resize: vertical; background: var(--panel); color: var(--muted);
                border: 1px solid var(--border); border-radius: 6px; padding: 6px; font: inherit;
            }
        </style>
    </head>
    <body>
        <div id="app-root"></div>
    </body>
</html>
