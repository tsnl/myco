<!doctype html>
<html>
    <head>
        <title>Myco</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <style>
            :root {
                --bg: #0f1115;
                --fg: #d7dbe2;
                --muted: #8b93a1;
                /* Hues mirror the CLI Palette semantics (session/transcript.rs):
                   USER bold cyan, ASSISTANT bold green, ERROR bold red,
                   thinking dim, tool names bold yellow. */
                --user: #39c5cf;
                --assistant: #7ee787;
                --error: #ff7b72;
                --think: #9aa3b2;
                --tool: #e3b341;
                --rule: #2c323d;
                --panel: #1b1f27;
                --border: #2c323d;
            }
            * { box-sizing: border-box; }
            html, body {
                margin: 0; height: 100%;
                background: var(--bg); color: var(--fg);
                font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }
            #app-root {
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .top {
                display: flex;
                align-items: baseline;
                gap: 12px;
                padding: 12px 0 8px;
                border-bottom: 1px solid var(--border);
                color: var(--muted);
                font-size: 12px;
            }
            .top .title { color: var(--fg); font-weight: 600; font-size: 14px; }
            .top .grow { flex: 1; }
            .transcript {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0 16px;
            }
            /* Full-width rules (Phase 1 deltas vs CLI 72-col box drawing). */
            .rule {
                border: 0;
                border-top: 1px solid var(--rule);
                margin: 18px 0 8px;
            }
            .rule.user {
                border-top-width: 2px;
                border-top-color: var(--user);
            }
            .rule.assistant {
                border-top-color: var(--assistant);
            }
            .rule.error {
                border-top-color: var(--error);
            }
            .header {
                font-size: 12px;
                letter-spacing: 0.06em;
                font-weight: 700;
                margin-bottom: 8px;
            }
            .header.user { color: var(--user); }
            .header.assistant { color: var(--assistant); }
            .header.error { color: var(--error); }
            .para {
                white-space: pre-wrap;
                word-break: break-word;
                margin: 0 0 10px;
            }
            .thinking { color: var(--think); font-style: italic; }
            .tool { color: var(--tool); }
            .composer {
                border-top: 1px solid var(--border);
                padding: 12px 0 16px;
                display: flex;
                gap: 8px;
                align-items: flex-end;
            }
            .composer textarea {
                flex: 1;
                resize: none;
                min-height: 72px;
                max-height: 200px;
                background: var(--panel);
                color: var(--fg);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 10px;
                font: inherit;
            }
            .composer button {
                background: var(--panel);
                color: var(--fg);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 10px 14px;
                cursor: pointer;
                font: inherit;
            }
            .composer button:hover:not(:disabled) { border-color: var(--assistant); }
            .composer button:disabled { opacity: 0.5; cursor: default; }
            .status { color: var(--muted); font-size: 12px; padding-bottom: 4px; min-height: 1.2em; }
            .status.err { color: var(--error); }
            .empty { color: var(--muted); padding: 24px 0; }
        </style>
    </head>
    <body>
        <div id="app-root"></div>
    </body>
</html>
