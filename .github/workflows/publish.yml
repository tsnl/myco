name: Publish

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to publish from"
        required: true
        default: "main"
        type: string
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run: skip automated commit, push, and publish"
        required: false
        default: true
        type: boolean
      release_notes:
        description: "Detailed release-notes markdown prepended to the GitHub Release body (optional)"
        required: false
        default: ""
        type: string
  # Fallback trigger for agents that can push but cannot POST /dispatches
  # (e.g. the Claude Code GitHub integration): pushing a change to
  # .github/publish-request.json on this branch runs the same publish job
  # with parameters read from that file.
  push:
    branches:
      - claude/publish-release-notes-a7uka1
    paths:
      - ".github/publish-request.json"

permissions:
  contents: write
  pull-requests: read
  checks: read

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    steps:
      # First checkout: the trigger ref, only to read the request file on
      # push events. The second checkout below switches to the publish branch.
      - uses: actions/checkout@v4

      - name: Resolve publish parameters
        id: params
        env:
          DISPATCH_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            branch="${{ github.event.inputs.branch }}"
            bump_type="${{ github.event.inputs.bump_type }}"
            dry_run="${{ github.event.inputs.dry_run }}"
            printf '%s\n' "$DISPATCH_NOTES" > "$RUNNER_TEMP/notes.md"
          else
            req=.github/publish-request.json
            branch="$(jq -er .branch "$req")"
            bump_type="$(jq -er .bump_type "$req")"
            dry_run="$(jq -er .dry_run "$req")"
            notes_path="$(jq -er .notes_path "$req")"
            cp "$notes_path" "$RUNNER_TEMP/notes.md"
          fi
          {
            echo "branch=$branch"
            echo "bump_type=$bump_type"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Cache Hugging Face Hub (MiniLM)
        uses: ./.github/actions/cache-hf-hub

      - name: Seed MiniLM embed weights
        run: bash scripts/seed-minilm-weights.sh

      - name: Semver bump and cargo publish
        id: publish
        uses: tsnl/semver-bump-and-cargo-publish@v1
        with:
          branch: ${{ steps.params.outputs.branch }}
          bump_type: ${{ steps.params.outputs.bump_type }}
          dry_run: ${{ steps.params.outputs.dry_run }}
          cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          pat_token: ${{ secrets.PAT_TOKEN }}
          # Match GitHub Actions check-run *names* (job names), not branch-protection
          # context strings. The composite action queries /check-runs by .name:
          #   Check Formatting, Lint, Test
          wait_for_checks: "Check Formatting, Lint, Test"
          check_wait_interval: "60"
          check_timeout_count: "30"
          rust_toolchain: "stable"
          git_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          git_user_name: "github-actions[bot]"

      - name: Assemble release body
        if: ${{ steps.params.outputs.dry_run != 'true' && steps.publish.outputs.published == 'true' }}
        run: |
          cp "$RUNNER_TEMP/notes.md" "$RUNNER_TEMP/release-body.md"
          cat >> "$RUNNER_TEMP/release-body.md" <<'BOILERPLATE'

          ---

          Published **${{ steps.publish.outputs.package_name }}** `${{ steps.publish.outputs.new_version }}`
          (was `${{ steps.publish.outputs.old_version }}`).

          crates.io: https://crates.io/crates/${{ steps.publish.outputs.package_name }}

          Install:
          ```bash
          cargo install myco --locked
          # or from this tag:
          cargo install --git https://github.com/${{ github.repository }} --tag ${{ steps.publish.outputs.tag_name }} --locked
          ```

          Platform-matched binaries are not attached here yet; build on the target
          host (MiniLM weights are baked in at compile time). See `myco --help harness-ops`.
          BOILERPLATE

      - name: Create GitHub Release
        if: ${{ steps.params.outputs.dry_run != 'true' && steps.publish.outputs.published == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.publish.outputs.tag_name }}
          name: ${{ steps.publish.outputs.new_version }}
          generate_release_notes: true
          body_path: ${{ runner.temp }}/release-body.md

      - name: Summary
        run: |
          {
            echo "## Publish summary"
            echo "- **Package**: ${{ steps.publish.outputs.package_name }}"
            echo "- **Branch**: ${{ steps.params.outputs.branch }}"
            echo "- **Version**: ${{ steps.publish.outputs.old_version }} → ${{ steps.publish.outputs.new_version }}"
            echo "- **Tag**: ${{ steps.publish.outputs.tag_name }}"
            echo "- **crates.io**: ${{ steps.publish.outputs.published }}"
            echo "- **Dry run**: ${{ steps.params.outputs.dry_run }}"
          } >> "$GITHUB_STEP_SUMMARY"
