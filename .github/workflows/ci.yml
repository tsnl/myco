name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Required checks for branch protection / publish wait_for_checks:
#   CI / Check Formatting
#   CI / Lint
#   CI / Test
jobs:
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cache MiniLM embed weights
        uses: actions/cache@v4
        with:
          path: src/text_search/embed_weights
          key: minilm-embed-${{ hashFiles('src/text_search/embed_weights/MODEL.manifest', 'build.rs') }}
      - name: cargo clippy
        # Root package targets (lib, bins, tests). Not crates/myco-gui / trunk.
        run: cargo clippy --locked --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache MiniLM embed weights
        uses: actions/cache@v4
        with:
          path: src/text_search/embed_weights
          key: minilm-embed-${{ hashFiles('src/text_search/embed_weights/MODEL.manifest', 'build.rs') }}
      - name: cargo test (offline)
        # Full suite, no live provider calls. Live Anthropic/xAI tests are
        # #[ignore] — run locally with: cargo test -- --ignored
        run: cargo test --locked
