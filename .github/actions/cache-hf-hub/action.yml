name: Cache Hugging Face Hub
description: >
  Point HF_HOME at a workspace path and restore/save the Hub cache
  (compatible with Python huggingface_hub and the Rust hf-hub crate).
  Optionally keep the legacy flat MiniLM seed dir warm for build.rs.

inputs:
  cache-key-prefix:
    description: Key prefix; bump to invalidate a poisoned cache.
    required: false
    default: minilm-hfhub-v1
  include-flat-seed:
    description: Also cache src/text_search/embed_weights (flat seed for build.rs).
    required: false
    default: "true"
  hf-home:
    description: Absolute or workspace-relative HF_HOME root (hub lives at <hf-home>/hub).
    required: false
    default: .hf

runs:
  using: composite
  steps:
    - name: Configure HF_HOME
      shell: bash
      run: |
        set -euo pipefail
        hf_home="${{ inputs.hf-home }}"
        case "$hf_home" in
          /*) ;;
          *) hf_home="${GITHUB_WORKSPACE}/${hf_home}" ;;
        esac
        mkdir -p "${hf_home}/hub"
        echo "HF_HOME=${hf_home}" >> "${GITHUB_ENV}"
        echo "Configured HF_HOME=${hf_home} (hub cache: ${hf_home}/hub)"

    - name: Cache HF hub (+ optional flat seed)
      if: ${{ inputs.include-flat-seed == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ${{ inputs.hf-home }}/hub
          src/text_search/embed_weights
        key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('src/text_search/embed_weights/MODEL.manifest', 'build.rs') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-

    - name: Cache HF hub only
      if: ${{ inputs.include-flat-seed != 'true' }}
      uses: actions/cache@v5
      with:
        path: ${{ inputs.hf-home }}/hub
        key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('src/text_search/embed_weights/MODEL.manifest', 'build.rs') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-
